# Build TWO debug APKs per run: armeabi-v7a (32-bit) then arm64-v8a (64-bit).
# Same idea as the Travis lesson: rm -rf .buildozer between builds; copy the right spec to buildozer.spec.
#
# - Push to main/master: workflow artifact contains both APKs.
# - Tag push v*: attach both APKs to a GitHub Release (built-in GITHUB_TOKEN).

name: Android (Buildozer)

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Android SDK/NDK are large)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            automake libltdl-dev patch libc6-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.1" buildozer

      # Use `python -m buildozer` so CI never depends on PATH to a `buildozer` script (fixes instant step failure).
      - name: Verify Buildozer
        run: |
          python -m buildozer --version

      - name: Prepare output folder for both APKs
        run: mkdir -p release-apks

      - name: Build debug APK — 32-bit (armeabi-v7a)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Compile 32-bit (armeabi-v7a) ==="
          ls -la
          rm -rf .buildozer
          cp -f buildozer-32-bit.spec buildozer.spec
          python -m buildozer android debug
          ls -la bin/
          cp -f bin/*.apk release-apks/

      - name: Build debug APK — 64-bit (arm64-v8a)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Compile 64-bit (arm64-v8a) ==="
          ls -la
          rm -rf .buildozer
          cp -f buildozer-64-bit.spec buildozer.spec
          python -m buildozer android debug
          ls -la bin/
          cp -f bin/*.apk release-apks/
          ls -la release-apks/

      - name: Upload both APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mortgage-calculator-debug-apks-v7a-v8a
          path: release-apks/*.apk
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*.apk
          generate_release_notes: true
