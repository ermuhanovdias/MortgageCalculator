# Build debug APK with Buildozer on GitHub-hosted runners (no Travis token required).
# - Every push to main/master: APK as workflow artifact (Actions → workflow run → Artifacts).
# - Git tag push matching v* (e.g. v0.1.0): same build + attach APK to a GitHub Release.

name: Android (Buildozer)

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Android SDK/NDK are large)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            automake libltdl-dev patch libc6-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.1" buildozer

      - name: Build debug APK (32-bit ARM)
        run: |
          buildozer --version
          buildozer -f buildozer-32-bit.spec android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mortgage-calculator-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          generate_release_notes: true
